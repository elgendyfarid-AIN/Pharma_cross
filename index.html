<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#050f1a"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Pharma Cross"/>
<title>Pharma Cross - الصيدلاني الذكي</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  min-height:100vh;
  background:linear-gradient(135deg,#050f1a 0%,#0a1f2e 50%,#071520 100%);
  font-family:'Segoe UI',Tahoma,sans-serif;
  direction:rtl; padding:20px 14px 40px; color:#d4e8e0;
}
.header { text-align:center; margin-bottom:22px; }
.badge {
  display:inline-block;
  background:linear-gradient(135deg,#00c896,#00a8d4);
  border-radius:14px; padding:7px 20px;
  font-size:11px; font-weight:700; color:#050f1a;
  letter-spacing:2px; margin-bottom:10px;
}
h1 { color:#fff; font-size:26px; font-weight:800; line-height:1.3; }
h1 span { color:#00c896; }
.subtitle { color:#5a8a7a; margin-top:6px; font-size:13px; }
.api-section {
  max-width:860px; margin:0 auto 18px;
  background:rgba(255,200,0,0.04); border:1.5px solid #2a2010;
  border-radius:14px; padding:14px 16px;
}
.api-row { display:flex; align-items:center; gap:10px; }
.api-label { color:#8a7030; font-size:12px; white-space:nowrap; font-weight:600; }
.api-input {
  flex:1; background:rgba(0,0,0,0.3); border:1px solid #3a3010;
  border-radius:8px; padding:8px 12px;
  color:#f0d080; font-size:13px; direction:ltr;
  font-family:monospace; outline:none;
}
.api-input::placeholder { color:#4a3a10; }
.api-hint { color:#4a3a10; font-size:11px; margin-top:8px; }
.tabs { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin-bottom:16px; }
.tab {
  padding:8px 18px; border-radius:20px; border:1.5px solid #1a3a2e;
  background:transparent; color:#4a7a68; font-weight:600; font-size:13px;
  cursor:pointer; transition:all .2s; font-family:inherit;
}
.tab.active { border-color:#00c896; background:rgba(0,200,150,.15); color:#00c896; }
.grid {
  display:grid; grid-template-columns:repeat(auto-fill,minmax(145px,1fr));
  gap:8px; max-width:860px; margin:0 auto 16px;
}
.pill {
  padding:10px 8px; border-radius:10px; border:1.5px solid #0f2a22;
  background:rgba(255,255,255,.02); color:#6a9a88;
  font-size:13px; cursor:pointer; text-align:center;
  transition:all .2s; line-height:1.4; font-family:inherit; font-weight:500;
}
.pill.active {
  border-color:#00c896;
  background:linear-gradient(135deg,rgba(0,200,150,.2),rgba(0,168,212,.1));
  color:#00e8b0; font-weight:700;
}
.custom-box {
  max-width:860px; margin:0 auto 16px;
  display:flex; align-items:center; gap:10px;
  background:rgba(255,255,255,.03); border:1.5px solid #0f2a22;
  border-radius:12px; padding:10px 14px;
}
.custom-box input {
  flex:1; background:transparent; border:none; outline:none;
  color:#c4ddd6; font-size:14px; direction:rtl; font-family:inherit;
}
.custom-box input::placeholder { color:#2a5a48; }
.btn-wrap { max-width:860px; margin:0 auto 24px; text-align:center; }
.btn {
  padding:14px 48px; border-radius:50px; border:none;
  background:linear-gradient(135deg,#00c896,#00a8d4);
  color:#050f1a; font-weight:800; font-size:16px;
  cursor:pointer; transition:all .3s; font-family:inherit;
  box-shadow:0 4px 20px rgba(0,200,150,0.3);
}
.btn:disabled { background:#0f2a22; color:#2a5a48; cursor:not-allowed; box-shadow:none; }
.btn:not(:disabled):active { transform:scale(0.97); }
.result-box {
  max-width:860px; margin:0 auto;
  background:rgba(255,255,255,.03); border:1.5px solid #0f2a22;
  border-radius:16px; padding:20px 10px;
  animation:fadeIn .4s ease;
}
.result-header {
  display:flex; align-items:center; gap:10px;
  padding:0 14px 14px; border-bottom:1px solid #0f2a22; margin-bottom:14px;
}
.result-tag {
  background:linear-gradient(135deg,#00c896,#00a8d4);
  border-radius:8px; padding:5px 14px;
  color:#050f1a; font-weight:800; font-size:13px;
}
.line { padding:4px 14px; line-height:1.75; font-size:14px; }
.line.head {
  padding:10px 14px; margin:6px 0 4px;
  background:rgba(0,200,150,.07); border-radius:8px;
  border-right:3px solid #00c896;
  font-weight:700; color:#00c896; font-size:15px;
}
.loader { max-width:860px; margin:0 auto; text-align:center; padding:30px; color:#00c896; font-size:15px; }
.error { max-width:860px; margin:0 auto; text-align:center; padding:20px; color:#ff8080; font-size:14px; background:rgba(255,80,80,0.05); border-radius:12px; }
@keyframes fadeIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>

<div class="header">
  <div class="badge">🔬 أداة الصيدلاني الذكي</div>
  <h1>Cross-Selling<br><span>المصاحب الذكي</span></h1>
  <p class="subtitle">اختر حالة واحصل على توصيات احترافية فوراً</p>
</div>

<div class="api-section">
  <div class="api-row">
    <span style="font-size:18px">🔑</span>
    <span class="api-label">Gemini API Key:</span>
    <input class="api-input" id="apiKey" type="password" placeholder="AIzaSy..." oninput="onKeyInput()"/>
    <span id="keyStatus" style="font-size:18px">⚪</span>
  </div>
  <div class="api-hint">🔒 الـ Key بيتحفظ على جهازك بس — مش بيتبعت لحد</div>
</div>

<div class="tabs" id="tabs"></div>
<div class="grid" id="grid"></div>

<div class="custom-box">
  <span style="color:#3a6a58;font-size:18px">✏️</span>
  <input id="custom" type="text" placeholder="أو اكتب حالة مخصصة... (مثال: سكري مع ضغط)" oninput="onCustomInput()" onkeydown="if(event.key==='Enter')generate()"/>
</div>

<div class="btn-wrap">
  <button class="btn" id="btn" onclick="generate()" disabled>🚀 اعمل Cross-Selling</button>
</div>

<div id="output"></div>

<script>
const CATS = {
  "أمراض مزمنة": [
    "ضغط الدم المرتفع","السكري النوع الثاني","خلل الدهون","قصور الغدة الدرقية",
    "فرط نشاط الغدة الدرقية","الربو","الحساسية المزمنة","الحموضة المزمنة / GERD",
    "القولون العصبي","الروماتويد","النقرس","الاكتئاب المزمن","القلق المزمن",
    "الصرع","باركنسون","ألزهايمر","فشل كلوي مزمن","الكبد الدهني",
    "أنيميا مزمنة","هشاشة العظام"
  ],
  "OTC شائع": [
    "مسكنات الألم (باراسيتامول / إيبوبروفين)","مضادات الحموضة","مضادات الهيستامين",
    "مكملات الفيتامينات","أوميغا 3","بروبيوتيك","ملينات / إمساك","مضادات إسهال",
    "قطرات عيون جافة","واقي شمس / كريمات","فيتامين د","كالسيوم",
    "زنك / مناعة","كولاجين","مكملات رجيم","منتجات الشعر والتساقط"
  ],
  "حالات خاصة": [
    "المرأة الحامل","المرضعة","كبار السن (65+)","الأطفال (0-12)","رياضيون",
    "مرضى ما بعد الجراحة","مرضى كيماوي","المسافرون"
  ]
};

const PROMPT = `أنت صيدلاني خبير في pharmacy counseling وcross-selling احترافي.
قدم تقرير cross-selling شامل باللغة العربية بهذا الترتيب الدقيق:
**1. 🎯 المنتجات الأساسية للبيع المصاحب** (3-5 منتجات مع سبب طبي واضح لكل منها)
**2. ⚠️ تنبيهات المريض الضرورية** (أهم 3 نقاط تذكّر بها المريض)
**3. 💊 تفاعلات وتحذيرات مهمة** (أبرز التفاعلات أو الاحتياطات)
**4. 📋 جملة البيع الاحترافية** (جملة واحدة مقنعة تقولها للمريض)
**5. 💡 فرصة cross-selling إضافية ذكية**
كن دقيقاً طبياً وموجزاً.`;

let activeCat = "أمراض مزمنة", activePill = "";

window.onload = () => {
  const saved = localStorage.getItem("gemini_pharma_key");
  if (saved) { document.getElementById("apiKey").value = saved; document.getElementById("keyStatus").textContent = "🟢"; }
  renderTabs(); renderGrid();
};

function onKeyInput() {
  const k = document.getElementById("apiKey").value.trim();
  if (k.startsWith("AIza") && k.length > 20) {
    localStorage.setItem("gemini_pharma_key", k);
    document.getElementById("keyStatus").textContent = "🟢";
  } else { document.getElementById("keyStatus").textContent = "🔴"; }
  updateBtn();
}

function renderTabs() {
  document.getElementById("tabs").innerHTML = Object.keys(CATS).map(cat =>
    `<button class="tab${cat===activeCat?' active':''}" onclick="selectCat('${cat}')">${cat}</button>`).join("");
}

function renderGrid() {
  document.getElementById("grid").innerHTML = CATS[activeCat].map(c =>
    `<button class="pill${c===activePill?' active':''}" onclick="selectPill('${c.replace(/'/g,"\\'")}')">${c}</button>`).join("");
}

function selectCat(cat) { activeCat=cat; activePill=""; renderTabs(); renderGrid(); updateBtn(); }
function selectPill(val) { document.getElementById("custom").value=""; activePill=val; renderGrid(); updateBtn(); }
function onCustomInput() { activePill=""; renderGrid(); updateBtn(); }

function updateBtn() {
  const q = document.getElementById("custom").value.trim() || activePill;
  const k = document.getElementById("apiKey").value.trim();
  document.getElementById("btn").disabled = !q || !(k.startsWith("AIza") && k.length > 20);
}

async function generate() {
  const q = document.getElementById("custom").value.trim() || activePill;
  const key = document.getElementById("apiKey").value.trim();
  if (!q || !key) return;
  document.getElementById("output").innerHTML = `<div class="loader">⏳ الذكاء الاصطناعي بيحلل الحالة...</div>`;
  document.getElementById("btn").disabled = true;
  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`,{
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        system_instruction:{parts:[{text:PROMPT}]},
        contents:[{parts:[{text:`حالة: ${q}`}]}]
      })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    const text = data.candidates?.[0]?.content?.parts?.[0]?.text || "";
    renderResult(q, text);
  } catch(e) {
    document.getElementById("output").innerHTML = `<div class="error">❌ خطأ: ${e.message}<br><br>تأكد من الـ API Key وجرب تاني</div>`;
  }
  document.getElementById("btn").disabled = false; updateBtn();
}

function renderResult(label, text) {
  const lines = text.split("\n").map(line => {
    if (!line.trim()) return `<div style="height:6px"></div>`;
    const isBold = /^\*\*/.test(line.trim());
    const clean = line.replace(/\*\*/g,"").replace(/^\*/,"•");
    return `<div class="line${isBold?' head':''}">${clean}</div>`;
  }).join("");
  document.getElementById("output").innerHTML = `
    <div class="result-box">
      <div class="result-header">
        <div class="result-tag">${label}</div>
        <span style="color:#2a5a48;font-size:12px">تحليل Cross-Selling</span>
      </div>${lines}
    </div>`;
}

document.getElementById("custom").addEventListener("input", updateBtn);
</script>
</body>
</html>
